services:
  # ==========================================
  # WordPress + Bedrock + FrankenPHP
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bedrock_app
    restart: unless-stopped
    environment:
      WP_ENV: ${WP_ENV:-production}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080/wp}
      DATABASE_URL: ${DATABASE_URL:-mysql://wordpress_user:wordpress_password@mariadb:3306/wordpress}
      AUTH_KEY: ${AUTH_KEY:-}
      SECURE_AUTH_KEY: ${SECURE_AUTH_KEY:-}
      LOGGED_IN_KEY: ${LOGGED_IN_KEY:-}
      NONCE_KEY: ${NONCE_KEY:-}
      AUTH_SALT: ${AUTH_SALT:-}
      SECURE_AUTH_SALT: ${SECURE_AUTH_SALT:-}
      LOGGED_IN_SALT: ${LOGGED_IN_SALT:-}
      NONCE_SALT: ${NONCE_SALT:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - mariadb

  # ==========================================
  # Database — MariaDB 11.4
  # ==========================================
  mariadb:
    image: mariadb:11.4
    container_name: bedrock_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-wordpress}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_USER: ${MARIADB_USER:-wordpress_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-wordpress_password}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
